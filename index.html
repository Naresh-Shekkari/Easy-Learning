<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            color: #38bdf8;
        }

        p {
            font-size: 22px;
        }

        button {
            padding: 12px 25px;
            border: none;
            background: #38bdf8;
            color: black;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Welcome to My Website</h1>

        <p>
            Hosted using GitHub Pages
        </p>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage() {
            alert("GitHub Pages Website Working Successfully!");
        }
    </script>

</body>
</html>
